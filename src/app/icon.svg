<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16" shape-rendering="crispEdges">
  <!-- Row 0: Hat peak (#b49858) cols 6-9 -->
  <rect x="6" y="0" width="1" height="1" fill="#b49858"/>
  <rect x="7" y="0" width="1" height="1" fill="#b49858"/>
  <rect x="8" y="0" width="1" height="1" fill="#b49858"/>
  <rect x="9" y="0" width="1" height="1" fill="#b49858"/>

  <!-- Row 1: Hat mid (#c4a868) cols 4-11 -->
  <rect x="4" y="1" width="8" height="1" fill="#c4a868"/>

  <!-- Row 2: Hat brim (#d4b878) cols 2-13 -->
  <rect x="2" y="2" width="12" height="1" fill="#d4b878"/>

  <!-- Row 3: Hat band (#8b3a3a) cols 2-13 -->
  <rect x="2" y="3" width="12" height="1" fill="#8b3a3a"/>

  <!-- Row 4: Hair (#1a1a2a) cols 4-11 -->
  <rect x="4" y="4" width="8" height="1" fill="#1a1a2a"/>

  <!-- Row 5: Hair sides (#1a1a2a) at cols 4,11 + Face (#f0d0a0) cols 5-10 -->
  <rect x="4" y="5" width="1" height="1" fill="#1a1a2a"/>
  <rect x="5" y="5" width="6" height="1" fill="#f0d0a0"/>
  <rect x="11" y="5" width="1" height="1" fill="#1a1a2a"/>

  <!-- Row 6: Eyes (#1a1a2a) at cols 5,10 + Face (#f0d0a0) cols 6-9 -->
  <rect x="5" y="6" width="1" height="1" fill="#1a1a2a"/>
  <rect x="6" y="6" width="4" height="1" fill="#f0d0a0"/>
  <rect x="10" y="6" width="1" height="1" fill="#1a1a2a"/>

  <!-- Row 7: Arms + Kimono -->
  <rect x="3" y="7" width="2" height="1" fill="#3a4a6a"/>
  <rect x="5" y="7" width="1" height="1" fill="#f0d0a0"/>
  <rect x="6" y="7" width="4" height="1" fill="#3a4a6a"/>
  <rect x="10" y="7" width="1" height="1" fill="#f0d0a0"/>
  <rect x="11" y="7" width="2" height="1" fill="#3a4a6a"/>

  <!-- Row 8: Arms + Kimono (same as row 7) -->
  <rect x="3" y="8" width="2" height="1" fill="#3a4a6a"/>
  <rect x="5" y="8" width="1" height="1" fill="#f0d0a0"/>
  <rect x="6" y="8" width="4" height="1" fill="#3a4a6a"/>
  <rect x="10" y="8" width="1" height="1" fill="#f0d0a0"/>
  <rect x="11" y="8" width="2" height="1" fill="#3a4a6a"/>

  <!-- Row 9: Kimono sides (#3a4a6a) + inner (#4a5a7a) -->
  <rect x="4" y="9" width="2" height="1" fill="#3a4a6a"/>
  <rect x="6" y="9" width="4" height="1" fill="#4a5a7a"/>
  <rect x="10" y="9" width="2" height="1" fill="#3a4a6a"/>

  <!-- Row 10: Obi belt (#8b3a3a) cols 4-11 -->
  <rect x="4" y="10" width="8" height="1" fill="#8b3a3a"/>

  <!-- Row 11: Legs (#1a1a3a) cols 5-10 -->
  <rect x="5" y="11" width="6" height="1" fill="#1a1a3a"/>

  <!-- Row 12: Legs (#1a1a3a) cols 5-10 -->
  <rect x="5" y="12" width="6" height="1" fill="#1a1a3a"/>

  <!-- Row 13: Sandals (#8b6f4e) cols 4-6 and 8-10 -->
  <rect x="4" y="13" width="3" height="1" fill="#8b6f4e"/>
  <rect x="8" y="13" width="3" height="1" fill="#8b6f4e"/>
</svg>
